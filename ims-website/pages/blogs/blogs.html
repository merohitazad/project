      <!-- BLOG CARDS -->

  <script src="../../assets/js/header.js" defer></script>
  <!-- Filter Script -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const buttons = Array.from(document.querySelectorAll(".category-btn"));
      const cards = Array.from(document.querySelectorAll(".blog-card"));
      const noResults = document.querySelector(".no-results");

      function normalize(val) {
        return (val || "ALL").toUpperCase();
      }

      function showNoResults(show) {
        if (noResults) noResults.style.display = show ? "block" : "none";
      }

      function filterPosts(category = "ALL") {
        const cat = normalize(category);
        let visible = 0;

        cards.forEach(card => {
          const cardCat = normalize(card.dataset.category);
          const match = cat === "ALL" || cardCat === cat;
          card.style.display = match ? "" : "none";
          if (match) visible++;
        });

        showNoResults(visible === 0);

        // notify pagination
        window.dispatchEvent(new Event("postsFiltered"));
      }

      // 🔑 expose globally (THIS IS THE KEY FIX)
      window.filterPosts = filterPosts;

      function setActiveButton(activeBtn) {
        buttons.forEach(btn => {
          const isActive = btn === activeBtn;
          btn.setAttribute("aria-pressed", String(isActive));
          btn.classList.toggle("active", isActive);
          btn.classList.toggle("inactive", !isActive);
        });
      }

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          setActiveButton(btn);
          filterPosts(btn.dataset.category || "ALL");
        });
      });

      if (buttons.length) setActiveButton(buttons[0]);
      filterPosts("ALL");
    });
  </script>
  <!-- Pagination Script -->
  <script>
    (function () {
      const PER_PAGE = 6;

      function init() {
        const grid = document.querySelector(".posts");
        if (!grid) return;

        const allCards = Array.from(grid.querySelectorAll(".blog-card"));
        const top = document.getElementById("pagination-top");
        const bottom = document.getElementById("pagination-bottom");

        let visibleCards = [];
        let currentPage = 1;
        let totalPages = 1;

        function collectVisibleCards() {
          visibleCards = allCards.filter(
            c => c.style.display !== "none"
          );
          totalPages = Math.ceil(visibleCards.length / PER_PAGE) || 1;
          currentPage = 1;
        }

        function hideAllCards() {
          allCards.forEach(c => (c.style.display = "none"));
        }

        function renderPage(page) {
          currentPage = Math.min(Math.max(1, page), totalPages);
          hideAllCards();

          const start = (currentPage - 1) * PER_PAGE;
          const end = start + PER_PAGE;

          visibleCards.slice(start, end).forEach(
            c => (c.style.display = "")
          );

          renderPagination(top);
          renderPagination(bottom);
        }

        function renderPagination(container) {
          if (!container) return;
          container.innerHTML = "";

          if (totalPages <= 1) {
            container.style.display = "none";
            return;
          }

          container.style.display = "";

          const prev = document.createElement("button");
          prev.textContent = "‹ Prev";
          prev.disabled = currentPage === 1;
          prev.onclick = () => renderPage(currentPage - 1);
          container.appendChild(prev);

          for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement("button");
            btn.textContent = i;
            if (i === currentPage) btn.setAttribute("aria-current", "true");
            btn.onclick = () => renderPage(i);
            container.appendChild(btn);
          }

          const next = document.createElement("button");
          next.textContent = "Next ›";
          next.disabled = currentPage === totalPages;
          next.onclick = () => renderPage(currentPage + 1);
          container.appendChild(next);
        }

        function applyPagination() {
          collectVisibleCards();
          if (visibleCards.length === 0) {
            if (top) top.style.display = "none";
            if (bottom) bottom.style.display = "none";
            return;
          }
          renderPage(1);
        }

        // Initial run
        applyPagination();

        // 🔑 sync with filter
        window.addEventListener("postsFiltered", applyPagination);
      }

      document.readyState === "loading"
        ? document.addEventListener("DOMContentLoaded", init)
        : init();
    })();
  </script>
  <!-- Embed Mode Script -->
  <script>
    function hideElements(selector) {
      if (!selector) return;
      document.querySelectorAll(selector).forEach(el => {
        el.style.setProperty("display", "none", "important");
        el.style.setProperty("visibility", "hidden", "important");
        el.style.setProperty("height", "0", "important");
        el.style.setProperty("margin", "0", "important");
        el.style.setProperty("padding", "0", "important");
      });
    }

    function applyExtraCss(cssText) {
      if (!cssText) return;
      const styleEl = document.createElement("style");
      styleEl.id = "embed-extra-style";
      styleEl.textContent = cssText;
      document.head.appendChild(styleEl);
    }

    function getValidCategories() {
      return Array.from(
        new Set(
          Array.from(document.querySelectorAll(".blog-card"))
            .map(c => (c.dataset.category || "").toUpperCase())
            .filter(Boolean)
        )
      );
    }

    function normalizeCategory(cat) {
      const valid = getValidCategories();
      const c = (cat || "ALL").toUpperCase();
      return c === "ALL" || valid.includes(c) ? c : "ALL";
    }

    document.addEventListener("DOMContentLoaded", function () {
      const params = new URLSearchParams(window.location.search);
      if (params.get("embed") !== "true") return;

      hideElements("header, footer, .filter-text, .filter-buttons, .content p, .badge");

      applyExtraCss(`
      main { margin-top: 0 !important; }
      .bottom-row { justify-content: center !important; }
    `);

      const requestedCategory = params.get("embedCategory");
      const category = normalizeCategory(requestedCategory);

      // Apply filter safely
      if (typeof window.filterPosts === "function") {
        window.filterPosts(category);
      } else {
        // Safety fallback (rare)
        window.addEventListener("DOMContentLoaded", () => {
          if (typeof window.filterPosts === "function") {
            window.filterPosts(category);
          }
        });
      }
    });
  </script>
